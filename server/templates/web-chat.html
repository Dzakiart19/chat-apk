<!doctype html>
<html lang="en">
  <head>
    <title>Dzeck AI Chat</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0A0A0C;
        --surface: #141418;
        --surface2: #1C1C22;
        --border: #2C2C34;
        --accent: #6C5CE7;
        --accent2: #7C6CF7;
        --text: #E8E8ED;
        --muted: #8E8E9A;
        --user-bubble: #1E1B3A;
        --ai-bubble: #141418;
      }

      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 15px;
        line-height: 1.6;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100dvh;
        max-width: 860px;
        margin: 0 auto;
      }

      /* Header */
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 20px;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
        flex-shrink: 0;
      }

      .header-logo {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .header-logo svg { width: 18px; height: 18px; fill: #fff; }

      .header-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text);
      }

      .header-subtitle {
        font-size: 12px;
        color: var(--muted);
      }

      .header-info { flex: 1; }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #30D158;
        flex-shrink: 0;
      }

      .mobile-link {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        font-size: 13px;
        font-weight: 500;
        color: var(--accent2);
        background: rgba(108, 92, 231, 0.12);
        border: 1px solid rgba(108, 92, 231, 0.25);
        border-radius: 8px;
        text-decoration: none;
        transition: background 0.15s;
      }

      .mobile-link:hover { background: rgba(108, 92, 231, 0.2); }
      .mobile-link svg { width: 14px; height: 14px; fill: currentColor; }

      /* Messages */
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        scroll-behavior: smooth;
      }

      #messages::-webkit-scrollbar { width: 4px; }
      #messages::-webkit-scrollbar-track { background: transparent; }
      #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

      .message { display: flex; gap: 10px; max-width: 100%; }
      .message.user { flex-direction: row-reverse; }

      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 14px;
        font-weight: 600;
      }

      .avatar.ai {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
      }

      .avatar.ai svg { width: 16px; height: 16px; fill: #fff; }

      .avatar.user {
        background: var(--surface2);
        color: var(--muted);
        font-size: 13px;
      }

      .bubble {
        max-width: min(600px, calc(100% - 42px));
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.65;
        word-break: break-word;
      }

      .message.user .bubble {
        background: var(--user-bubble);
        border: 1px solid rgba(108, 92, 231, 0.2);
        border-bottom-right-radius: 4px;
      }

      .message.ai .bubble {
        background: var(--ai-bubble);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }

      .bubble p { margin-bottom: 8px; }
      .bubble p:last-child { margin-bottom: 0; }
      .bubble code {
        background: rgba(255,255,255,0.07);
        padding: 1px 5px;
        border-radius: 4px;
        font-size: 13px;
        font-family: "JetBrains Mono", "Fira Code", Menlo, monospace;
      }
      .bubble pre {
        background: rgba(0,0,0,0.35);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        overflow-x: auto;
        margin: 8px 0;
      }
      .bubble pre code { background: none; padding: 0; }
      .bubble strong { color: #fff; }
      .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
      .bubble li { margin: 3px 0; }

      .typing-indicator {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 14px 16px;
      }

      .typing-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--muted);
        animation: typingBounce 1.2s ease-in-out infinite;
      }

      .typing-dot:nth-child(2) { animation-delay: 0.2s; }
      .typing-dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes typingBounce {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
        30% { transform: translateY(-4px); opacity: 1; }
      }

      .cursor {
        display: inline-block;
        width: 2px;
        height: 16px;
        background: var(--accent2);
        margin-left: 2px;
        vertical-align: middle;
        animation: blink 0.9s step-end infinite;
      }

      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

      /* Tool/step events */
      .step-event {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
        padding: 4px 0;
      }

      .step-event svg { width: 12px; height: 12px; fill: var(--accent2); flex-shrink: 0; }

      /* Empty state */
      #empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1;
        gap: 12px;
        color: var(--muted);
        text-align: center;
        padding: 40px 20px;
      }

      #empty-state .big-logo {
        width: 64px;
        height: 64px;
        border-radius: 20px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 32px rgba(108, 92, 231, 0.25);
        margin-bottom: 4px;
      }

      #empty-state .big-logo svg { width: 32px; height: 32px; fill: #fff; }
      #empty-state h2 { font-size: 20px; font-weight: 700; color: var(--text); }
      #empty-state p { font-size: 14px; max-width: 320px; }

      .suggestions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-top: 8px;
      }

      .suggestion-chip {
        padding: 8px 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        font-size: 13px;
        color: var(--text);
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
      }

      .suggestion-chip:hover {
        border-color: var(--accent);
        background: rgba(108, 92, 231, 0.08);
      }

      /* Input area */
      #input-area {
        padding: 12px 20px 20px;
        border-top: 1px solid var(--border);
        background: var(--bg);
        flex-shrink: 0;
      }

      .input-box {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 10px 10px 10px 16px;
        transition: border-color 0.15s;
      }

      .input-box:focus-within { border-color: var(--accent); }

      #user-input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        color: var(--text);
        font-size: 14px;
        line-height: 1.5;
        resize: none;
        max-height: 160px;
        min-height: 24px;
        font-family: inherit;
        scrollbar-width: none;
      }

      #user-input::placeholder { color: var(--muted); }
      #user-input::-webkit-scrollbar { display: none; }

      #send-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: opacity 0.15s, transform 0.1s;
      }

      #send-btn:hover { opacity: 0.9; transform: scale(1.04); }
      #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
      #send-btn svg { width: 16px; height: 16px; fill: #fff; }

      #stop-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: var(--surface2);
        border: 1px solid var(--border);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: background 0.15s;
      }

      #stop-btn:hover { background: #2C2C34; }
      #stop-btn svg { width: 14px; height: 14px; fill: var(--muted); }

      .input-hint {
        font-size: 11px;
        color: var(--muted);
        text-align: center;
        margin-top: 8px;
        opacity: 0.6;
      }

      /* Error toast */
      #error-toast {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: #3A1010;
        border: 1px solid #7A2020;
        color: #FF6B6B;
        padding: 10px 18px;
        border-radius: 10px;
        font-size: 13px;
        opacity: 0;
        transition: opacity 0.2s, transform 0.2s;
        pointer-events: none;
        white-space: nowrap;
        z-index: 100;
      }

      #error-toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      @media (max-width: 480px) {
        header { padding: 12px 16px; }
        #messages { padding: 16px; gap: 16px; }
        #input-area { padding: 10px 16px 16px; }
        .mobile-link span { display: none; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="header-logo">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
        </div>
        <div class="header-info">
          <div class="header-title">Dzeck AI</div>
          <div class="header-subtitle">Mistral Agent &bull; Streaming</div>
        </div>
        <div class="status-dot" title="Online"></div>
        <a href="/mobile" class="mobile-link">
          <svg viewBox="0 0 24 24"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>
          <span>Mobile</span>
        </a>
      </header>

      <div id="messages">
        <div id="empty-state">
          <div class="big-logo">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <h2>Dzeck AI</h2>
          <p>AI Agent powered by Mistral with tools and memory. Ask anything.</p>
          <div class="suggestions">
            <div class="suggestion-chip" onclick="sendSuggestion(this)">What can you do?</div>
            <div class="suggestion-chip" onclick="sendSuggestion(this)">Explain quantum computing</div>
            <div class="suggestion-chip" onclick="sendSuggestion(this)">Write a Python script</div>
            <div class="suggestion-chip" onclick="sendSuggestion(this)">Summarize the news today</div>
          </div>
        </div>
      </div>

      <div id="input-area">
        <div class="input-box">
          <textarea
            id="user-input"
            placeholder="Message Dzeck AI..."
            rows="1"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <button id="send-btn" onclick="sendMessage()" title="Send">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
          <button id="stop-btn" style="display:none" onclick="stopGeneration()" title="Stop">
            <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          </button>
        </div>
        <div class="input-hint">Enter to send &bull; Shift+Enter for new line</div>
      </div>
    </div>

    <div id="error-toast"></div>

    <script>
      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('user-input');
      const sendBtn = document.getElementById('send-btn');
      const stopBtn = document.getElementById('stop-btn');
      const emptyState = document.getElementById('empty-state');

      let messageHistory = [];
      let sessionId = null;
      let currentEventSource = null;
      let isStreaming = false;
      let currentAiBubble = null;
      let currentAiContent = '';

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
      }

      function renderMarkdown(text) {
        let html = escapeHtml(text);
        html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
          `<pre><code>${code}</code></pre>`
        );
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
        html = html.replace(/^### (.+)$/gm, '<strong>$1</strong>');
        html = html.replace(/^## (.+)$/gm, '<strong>$1</strong>');
        html = html.replace(/^# (.+)$/gm, '<strong>$1</strong>');
        html = html.replace(/^\- (.+)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
        html = html.replace(/\n\n+/g, '</p><p>');
        html = html.replace(/\n/g, '<br>');
        html = '<p>' + html + '</p>';
        html = html.replace(/<p><\/p>/g, '');
        return html;
      }

      function appendUserMessage(text) {
        if (emptyState) emptyState.remove();

        const div = document.createElement('div');
        div.className = 'message user';
        div.innerHTML = `
          <div class="avatar user">Me</div>
          <div class="bubble">${renderMarkdown(text)}</div>
        `;
        messagesEl.appendChild(div);
        scrollToBottom();
      }

      function createAiMessageEl() {
        if (emptyState) emptyState.remove();

        const div = document.createElement('div');
        div.className = 'message ai';
        div.innerHTML = `
          <div class="avatar ai">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <div class="bubble" id="ai-bubble-current">
            <div class="typing-indicator">
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
            </div>
          </div>
        `;
        messagesEl.appendChild(div);
        scrollToBottom();
        return div.querySelector('#ai-bubble-current');
      }

      function appendStepEvent(text) {
        const div = document.createElement('div');
        div.className = 'step-event';
        div.innerHTML = `
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/></svg>
          <span>${escapeHtml(text)}</span>
        `;
        messagesEl.appendChild(div);
        scrollToBottom();
      }

      function scrollToBottom() {
        messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
      }

      function showError(msg) {
        const toast = document.getElementById('error-toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 4000);
      }

      function setStreaming(streaming) {
        isStreaming = streaming;
        sendBtn.style.display = streaming ? 'none' : 'flex';
        stopBtn.style.display = streaming ? 'flex' : 'none';
        inputEl.disabled = streaming;
        if (!streaming) inputEl.focus();
      }

      function stopGeneration() {
        if (currentEventSource) {
          currentEventSource.close();
          currentEventSource = null;
        }
        if (currentAiBubble && currentAiContent) {
          currentAiBubble.innerHTML = renderMarkdown(currentAiContent);
        } else if (currentAiBubble) {
          currentAiBubble.innerHTML = '<em style="color:var(--muted)">Stopped.</em>';
        }
        currentAiBubble = null;
        currentAiContent = '';
        setStreaming(false);
      }

      async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || isStreaming) return;

        inputEl.value = '';
        inputEl.style.height = 'auto';

        appendUserMessage(text);
        messageHistory.push({ role: 'user', content: text });

        setStreaming(true);
        currentAiBubble = createAiMessageEl();
        currentAiContent = '';

        try {
          const response = await fetch('/api/agent', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: text,
              messages: messageHistory.slice(0, -1),
              session_id: sessionId,
            }),
          });

          if (!response.ok) {
            throw new Error(`Server error ${response.status}`);
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let sseBuffer = '';

          const processSSE = async () => {
            while (true) {
              const { value, done } = await reader.read();
              if (done) break;

              sseBuffer += decoder.decode(value, { stream: true });
              const lines = sseBuffer.split('\n');
              sseBuffer = lines.pop();

              for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const data = line.slice(6).trim();
                if (data === '[DONE]') {
                  finalizeAiMessage();
                  return;
                }
                try {
                  const evt = JSON.parse(data);
                  handleSSEEvent(evt);
                } catch {}
              }
            }
            finalizeAiMessage();
          };

          await processSSE();

        } catch (err) {
          console.error('Stream error:', err);
          if (currentAiBubble) {
            currentAiBubble.innerHTML = '<em style="color:#FF6B6B">Error connecting to AI. Please try again.</em>';
          }
          showError('Failed to get response. Check your connection.');
          setStreaming(false);
          currentAiBubble = null;
          currentAiContent = '';
        }
      }

      function handleSSEEvent(evt) {
        if (!evt || !evt.type) return;

        if (evt.type === 'session') {
          sessionId = evt.session_id;
          return;
        }

        // Agent streaming: message_chunk is the primary token event
        if (evt.type === 'message_chunk') {
          const token = evt.chunk || '';
          if (token && currentAiBubble) {
            currentAiContent += token;
            currentAiBubble.innerHTML = renderMarkdown(currentAiContent) + '<span class="cursor"></span>';
            scrollToBottom();
          }
          return;
        }

        if (evt.type === 'message_start') {
          return;
        }

        if (evt.type === 'message_end') {
          return;
        }

        // Step / tool events
        if (evt.type === 'step') {
          const step = evt.step || {};
          const status = evt.status || '';
          const name = step.name || step.tool || step.action || '';
          const desc = step.description || step.result || '';
          if (name && status !== 'completed') {
            appendStepEvent(name + (desc ? ': ' + desc.slice(0, 80) : ''));
          }
          return;
        }

        if (evt.type === 'plan') {
          const plan = evt.plan || {};
          const planStatus = evt.status || '';
          if (planStatus === 'creating' || planStatus === 'created') {
            if (plan.title) appendStepEvent('Plan: ' + plan.title);
          }
          return;
        }

        if (evt.type === 'title') {
          return;
        }

        if (evt.type === 'done') {
          return;
        }

        if (evt.type === 'error') {
          showError(evt.error || 'AI error occurred');
          return;
        }

        // Fallback for generic content events
        const content = evt.content || evt.response || evt.text || evt.message || evt.chunk || '';
        if (content && currentAiBubble) {
          currentAiContent += content;
          currentAiBubble.innerHTML = renderMarkdown(currentAiContent) + '<span class="cursor"></span>';
          scrollToBottom();
        }
      }

      function finalizeAiMessage() {
        if (currentAiBubble) {
          if (currentAiContent) {
            currentAiBubble.innerHTML = renderMarkdown(currentAiContent);
            messageHistory.push({ role: 'assistant', content: currentAiContent });
          } else {
            currentAiBubble.innerHTML = '<em style="color:var(--muted)">No response received.</em>';
          }
        }
        currentAiBubble = null;
        currentAiContent = '';
        setStreaming(false);
      }

      function sendSuggestion(el) {
        inputEl.value = el.textContent;
        sendMessage();
      }

      inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      inputEl.addEventListener('input', () => {
        inputEl.style.height = 'auto';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
      });

      inputEl.focus();
    </script>
  </body>
</html>
